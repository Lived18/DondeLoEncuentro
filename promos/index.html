<body>

    <div class="titulo-promos">
      <button class="btn-volver" onclick="window.location.href='../hamburgueserias/index.html'"> ← Volver</button>

    </div>
    
    <main class="promos-lista">

        <!-- ===================== -->
        <!-- AGREGÁ TUS PROMOS ACÁ -->
        <!-- Copiá y pegá el bloque de abajo por cada promo nueva -->
        <!-- Parámetros de abrirModal: ('imagen', 'Nombre', 'URL de WhatsApp') -->
        <!-- ===================== -->

        <div class="promo-card" onclick="abrirModal('../imagenes/promociones 1.PNG', 'Promo 1', 'https://pedix.app/grilx/')">
            <img src="../imagenes/promociones 1.png" alt="Promo 1">
        </div>

        <div class="promo-card" onclick="abrirModal('../imagenes/promociones 3.png', 'Promo 2', 'https://wa.me/5493812126498?text=Hola%21%20Vengo%20de%20las%20promociones%20de%20Donde%20Lo%20Encuentro%2C%20quiero%20hacer%20un%20pedido%3A')">
            <img src="../imagenes/promociones 3.png" alt="Promo 2">
        </div>


        <!-- FIN PROMOS -->

    </main>

    <!-- MODAL -->
    <div class="modal-overlay" id="modalOverlay" onclick="cerrarSiOverlay(event)">
        <div class="modal-card" id="modalCard">
            <button class="modal-close" onclick="cerrarModal()">X</button>
            <img id="modalImg" src="" alt="Promo 1">
            <div class="link-directo">
                <button id="modalBtn">PEDIR AQUI</button>
            </div>
        </div>
    </div>

    <footer>

            <button onclick="window.open('https://docs.google.com/forms/d/e/1FAIpQLSdVfvzEZTrDfLBePvFMaaIzUtBsdshWhvagwYHzDNZ9cpwaIw/viewform?usp=dialog')">Reportar Problema</button>

            <button onclick="window.location.href='../sobrenosotros'">Sobre Nosotros</button>
            <button onclick="window.location.href='https://www.instagram.com/dondeloencuentro_tuc'">Instagram</button>
        <p>Todos los derechos reservados ©</p>
    </footer>


    <script>
  // MENU DESPLEGABLE
  function toggleMenu() {
    const btn = document.getElementById('menuBtn');
    const menu = document.getElementById('dropdownMenu');
    const overlay = document.getElementById('menuOverlay');
    const isOpen = menu.classList.contains('open');
    btn.classList.toggle('open', !isOpen);
    menu.classList.toggle('open', !isOpen);
    overlay.classList.toggle('open', !isOpen);
  }

  function closeMenu() {
    document.getElementById('menuBtn').classList.remove('open');
    document.getElementById('dropdownMenu').classList.remove('open');
    document.getElementById('menuOverlay').classList.remove('open');
  }

  // RASTREO DE CLICS EN PROMOS
  function rastrearClicPromo(nombrePromo, canal, url) {
    gtag('event', 'click_promo', {
      'promo': nombrePromo,
      'canal': canal,
      'pagina': 'promos'
    });
    window.location.href = url;
  }

  // MODAL
  function abrirModal(imgSrc, nombre, url) {
    const modalImg = document.getElementById('modalImg');
    const modalBtn = document.getElementById('modalBtn');
    const modalOverlay = document.getElementById('modalOverlay');
    
    // Limpiar y resetear la imagen forzando recarga
    modalImg.src = '';
    modalImg.alt = nombre;
    
    // Usar setTimeout para asegurar que la imagen se carga fresca
    setTimeout(function() {
      modalImg.src = imgSrc + '?t=' + new Date().getTime();
      modalBtn.onclick = function() {
        rastrearClicPromo(nombre, 'whatsapp', url);
      };
    }, 10);
    
    // Mostrar el modal
    modalOverlay.classList.add('open');
  }

  function cerrarModal() {
    document.getElementById('modalOverlay').classList.remove('open');
  }

  function cerrarSiOverlay(e) {
    if (e.target === document.getElementById('modalOverlay')) cerrarModal();
  }

  // Cerrar modal con tecla Escape
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') cerrarModal();
  });
    </script>

</body>
</html>
